# Tell Railway's Nixpacks builder to use Python 3.11
# (psycopg2-binary wheels are stable on this version).

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[start]
cmd = ". /opt/venv/bin/activate && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
